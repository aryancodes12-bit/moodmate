<svg width="680" height="580" viewBox="0 0 680 580" xmlns="http://www.w3.org/2000/svg" style="font-family:system-ui,sans-serif;background:#0d0f1a;border-radius:12px">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#888" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- USER -->
  <rect x="270" y="20" width="140" height="44" rx="8" fill="#3C3489" stroke="#534AB7" stroke-width="0.5"/>
  <text x="340" y="47" text-anchor="middle" fill="#EEEDFE" font-size="13" font-weight="500">User / Browser</text>

  <line x1="340" y1="64" x2="340" y2="98" stroke="#888" stroke-width="1" marker-end="url(#arrow)"/>
  <text x="352" y="85" fill="#888" font-size="11">visits</text>

  <!-- REACT APP -->
  <rect x="200" y="98" width="280" height="56" rx="8" fill="#0C447C" stroke="#185FA5" stroke-width="0.5"/>
  <text x="340" y="122" text-anchor="middle" fill="#E6F1FB" font-size="13" font-weight="500">React App</text>
  <text x="340" y="140" text-anchor="middle" fill="#85B7EB" font-size="11">moodmate-web.vercel.app</text>

  <!-- Arrow left to Supabase -->
  <path d="M200 130 L120 130 L120 310 L150 310" fill="none" stroke="#888" stroke-width="1" marker-end="url(#arrow)"/>
  <text x="55" y="218" text-anchor="middle" fill="#888" font-size="11">auth +</text>
  <text x="55" y="232" text-anchor="middle" fill="#888" font-size="11">data</text>

  <!-- Arrow right to Vercel API -->
  <path d="M480 130 L560 130 L560 310 L530 310" fill="none" stroke="#888" stroke-width="1" marker-end="url(#arrow)"/>
  <text x="618" y="218" text-anchor="middle" fill="#888" font-size="11">AI chat</text>
  <text x="618" y="232" text-anchor="middle" fill="#888" font-size="11">request</text>

  <!-- Arrow down -->
  <line x1="340" y1="154" x2="340" y2="188" stroke="#888" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- VERCEL container -->
  <rect x="140" y="188" width="400" height="120" rx="12" fill="#1a1a2e" stroke="#444" stroke-width="0.5"/>
  <text x="340" y="210" text-anchor="middle" fill="#aaa" font-size="12" font-weight="500">Vercel</text>

  <!-- Static -->
  <rect x="162" y="220" width="160" height="68" rx="8" fill="#085041" stroke="#0F6E56" stroke-width="0.5"/>
  <text x="242" y="248" text-anchor="middle" fill="#E1F5EE" font-size="12" font-weight="500">Static Build</text>
  <text x="242" y="266" text-anchor="middle" fill="#9FE1CB" font-size="11">HTML / JS / CSS</text>

  <!-- Serverless -->
  <rect x="358" y="220" width="160" height="68" rx="8" fill="#633806" stroke="#854F0B" stroke-width="0.5"/>
  <text x="438" y="248" text-anchor="middle" fill="#FAEEDA" font-size="12" font-weight="500">api/chat.js</text>
  <text x="438" y="266" text-anchor="middle" fill="#FAC775" font-size="11">Serverless function</text>

  <!-- Arrow serverless → Groq -->
  <line x1="438" y1="308" x2="438" y2="360" stroke="#888" stroke-width="1" marker-end="url(#arrow)"/>
  <text x="465" y="337" fill="#888" font-size="11">Groq</text>
  <text x="465" y="351" fill="#888" font-size="11">API call</text>

  <!-- SUPABASE -->
  <rect x="150" y="310" width="170" height="68" rx="8" fill="#085041" stroke="#0F6E56" stroke-width="0.5"/>
  <text x="235" y="338" text-anchor="middle" fill="#E1F5EE" font-size="12" font-weight="500">Supabase</text>
  <text x="235" y="357" text-anchor="middle" fill="#9FE1CB" font-size="11">PostgreSQL + Auth</text>

  <!-- DB tables -->
  <rect x="30" y="420" width="128" height="44" rx="6" fill="#222" stroke="#444" stroke-width="0.5"/>
  <text x="94" y="447" text-anchor="middle" fill="#aaa" font-size="11">journal_entries</text>

  <rect x="172" y="420" width="128" height="44" rx="6" fill="#222" stroke="#444" stroke-width="0.5"/>
  <text x="236" y="447" text-anchor="middle" fill="#aaa" font-size="11">community_posts</text>

  <rect x="314" y="420" width="120" height="44" rx="6" fill="#222" stroke="#444" stroke-width="0.5"/>
  <text x="374" y="447" text-anchor="middle" fill="#aaa" font-size="11">weekly_plans</text>

  <line x1="94" y1="420" x2="200" y2="378" stroke="#555" stroke-width="0.5" marker-end="url(#arrow)"/>
  <line x1="236" y1="420" x2="235" y2="378" stroke="#555" stroke-width="0.5" marker-end="url(#arrow)"/>
  <line x1="374" y1="420" x2="262" y2="378" stroke="#555" stroke-width="0.5" marker-end="url(#arrow)"/>

  <!-- GROQ -->
  <rect x="358" y="360" width="170" height="68" rx="8" fill="#4A1B0C" stroke="#993C1D" stroke-width="0.5"/>
  <text x="443" y="388" text-anchor="middle" fill="#FAECE7" font-size="12" font-weight="500">Groq API</text>
  <text x="443" y="407" text-anchor="middle" fill="#F5C4B3" font-size="11">Llama 3.3 70B</text>

  <!-- Google OAuth -->
  <rect x="458" y="420" width="140" height="44" rx="6" fill="#0C447C" stroke="#185FA5" stroke-width="0.5"/>
  <text x="528" y="447" text-anchor="middle" fill="#B5D4F4" font-size="11">Google OAuth</text>
  <line x1="528" y1="420" x2="450" y2="378" stroke="#555" stroke-width="0.5" marker-end="url(#arrow)"/>

  <!-- PWA badge -->
  <rect x="460" y="60" width="100" height="36" rx="6" fill="#3C3489" stroke="#534AB7" stroke-width="0.5"/>
  <text x="510" y="83" text-anchor="middle" fill="#CECBF6" font-size="11">PWA / sw.js</text>
  <line x1="480" y1="98" x2="510" y2="96" stroke="#555" stroke-width="0.5" stroke-dasharray="3 3"/>

  <!-- Footer note -->
  <text x="340" y="540" text-anchor="middle" fill="#555" font-size="11">server.js (Express) — local dev only, replaced by api/chat.js on Vercel</text>
</svg>
