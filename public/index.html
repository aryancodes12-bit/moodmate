<!DOCTYPE html>
<html lang="en">

<head>
  <script src="https://cdn.tailwindcss.com"></script>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />

  <!-- PWA Meta Tags -->
  <meta name="theme-color" content="#818cf8" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="MoodMate" />
  <meta name="application-name" content="MoodMate" />
  <meta name="msapplication-TileColor" content="#818cf8" />

  <!-- SEO -->
  <meta name="description"
    content="MoodMate — Your AI-powered mental wellness companion. Journal your moods, chat with Aura, and understand your emotional patterns." />
  <meta name="keywords" content="mental wellness, mood journal, AI chat, anxiety relief, mood tracker" />

  <!-- Open Graph -->
  <meta property="og:title" content="MoodMate — AI Mental Wellness" />
  <meta property="og:description"
    content="Journal your moods, chat with Aura, and understand your emotional patterns." />
  <meta property="og:type" content="website" />
  <meta property="og:image" content="%PUBLIC_URL%/sidebar.png" />

  <!-- Icons -->
  <link rel="icon" href="%PUBLIC_URL%/favicon.ico" />
  <link rel="apple-touch-icon" href="%PUBLIC_URL%/sidebar.png" />
  <link rel="apple-touch-icon" sizes="152x152" href="%PUBLIC_URL%/sidebar.png" />
  <link rel="apple-touch-icon" sizes="180x180" href="%PUBLIC_URL%/sidebar.png" />
  <link rel="apple-touch-icon" sizes="167x167" href="%PUBLIC_URL%/sidebar.png" />

  <!-- Manifest -->
  <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />

  <!-- Preconnect for performance -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

  <title>MoodMate — AI Mental Wellness</title>

  <style>
    html,
    body {
      height: 100%;
      margin: 0;
      padding: 0;
    }

    body {
      background: #0d0f1a;
    }

    #root {
      min-height: 100%;
      min-height: 100dvh;
    }
  </style>
</head>

<body>
  <noscript>Please enable JavaScript to use MoodMate.</noscript>
  <div id="root"></div>
</body>

</html>
